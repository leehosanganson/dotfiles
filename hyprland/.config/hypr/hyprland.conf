# 1. MONITORS - The positioning math explained
# LEFT: 1440p portrait (2560x1440 rotated = 1440x2560)
# RIGHT BOTTOM: 2K ultrawide (~3440x1440 landscape)  
# RIGHT TOP: 1080p (~1920x1080 landscape, stacked above ultrawide)
monitor=DP-1,2560x1440@60,0x0,1,transform,90        # LEFT portrait (0,0 origin)
monitor=HDMI-A-1,3440x1440@144,1440x0,1             # RIGHT bottom (x starts after left monitor width)
monitor=HDMI-A-2,1920x1080@60,1440x1440,1           # RIGHT top (y starts after ultrawide height)

# 2. KEYBOARD - Flat accel = native feel
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat
}

# 3. LAYOUT - Dwindle = master/stack, most predictable
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    layout = dwindle
}

# 4. ANIMATIONS - Fast, consistent single curve
animations {
    enabled = yes
    bezier = fast, 0.05, 0.9, 0.1, 1.05
    
    animation = windows, 1, 4, fast
    animation = windowsOut, 1, 4, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 4, default
    animation = workspaces, 1, 4, fast
}

# 5. BINDS - Logical groups, safe destructors
$mainMod = SUPER

# === LAUNCHERS ===
bind = $mainMod,        Q, exec, ghostty
bind = $mainMod,        E, exec, thunar
bind = $mainMod,        R, exec, rofi -show drun

# === WINDOWS ===
bind = $mainMod,        V, togglefloating
bind = $mainMod,        P, pseudo
bind = $mainMod,        J, togglesplit

bind = $mainMod SHIFT,  Q, killactive

# === FOCUS MOVEMENT ===
bind = $mainMod, left,    movefocus, l
bind = $mainMod, right,   movefocus, r  
bind = $mainMod, up,      movefocus, u
bind = $mainMod, down,    movefocus, d

# === WORKSPACES - 1-3 per monitor pattern ===
bind = $mainMod,        1, workspace, 1
bind = $mainMod,        2, workspace, 2
bind = $mainMod,        3, workspace, 3
bind = $mainMod,        4, workspace, 4
bind = $mainMod,        5, workspace, 5

bind = $mainMod SHIFT,  1, movetoworkspace, 1
bind = $mainMod SHIFT,  2, movetoworkspace, 2
bind = $mainMod SHIFT,  3, movetoworkspace, 3
bind = $mainMod SHIFT,  4, movetoworkspace, 4
bind = $mainMod SHIFT,  5, movetoworkspace, 5

# === SESSION ===
bind = $mainMod SHIFT,  E, exit

